name: Deploy to Vercel (Prod)

on:
  push:
    branches:
      - prod

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate env.js from secrets
        run: node scripts/build-env.js
        env:
          VERCEL_ENV: Production
          PROD_FIREBASE_API_KEY:             ${{ secrets.PROD_FIREBASE_API_KEY }}
          PROD_FIREBASE_AUTH_DOMAIN:         ${{ secrets.PROD_FIREBASE_AUTH_DOMAIN }}
          PROD_FIREBASE_PROJECT_ID:          ${{ secrets.PROD_FIREBASE_PROJECT_ID }}
          PROD_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.PROD_FIREBASE_MESSAGING_SENDER_ID }}
          PROD_FIREBASE_APP_ID:              ${{ secrets.PROD_FIREBASE_APP_ID }}

      - name: Run tests
        run: npm test

      - name: Seed Firestore with demo data
        run: npm run seed
        env:
          PROD_FIREBASE_PROJECT_ID:    ${{ secrets.PROD_FIREBASE_PROJECT_ID }}
          PROD_FIREBASE_CLIENT_EMAIL:  ${{ secrets.PROD_FIREBASE_CLIENT_EMAIL }}
          PROD_FIREBASE_PRIVATE_KEY:   ${{ secrets.PROD_FIREBASE_PRIVATE_KEY }}

      - name: Trigger Vercel deploy
        run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
