<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShareCare — Post</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/style.css">
  <style>
    /* === CRITICAL LAYOUT === */
    html,body{margin:0;padding:0;}

    .detail-layout{display:grid;grid-template-columns:1fr 300px;gap:28px;align-items:start;}
    .post-hero{width:100%;height:280px;object-fit:cover;border-radius:var(--radius-lg);margin-bottom:24px;display:block;}
    .post-meta-bar{display:flex;align-items:center;gap:16px;margin-bottom:16px;flex-wrap:wrap;}
    .post-meta-bar .post-meta-item{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--text-muted);}
    .post-meta-bar .post-meta-item i{font-size:15px;}
    .author-row{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
    .author-info{flex:1;}
    .author-name{font-size:14px;font-weight:600;}
    .author-bio{font-size:12px;color:var(--text-muted);margin-top:2px;}
    .post-body{font-size:14px;line-height:1.85;color:var(--text);}
    .post-body h3{font-family:'DM Serif Display',serif;font-size:20px;margin:24px 0 10px;}
    .post-body p{margin-bottom:14px;}
    .post-body ul{margin:0 0 14px 20px;}
    .post-body li{margin-bottom:6px;font-size:14px;line-height:1.7;}
    .helpful-bar{display:flex;align-items:center;gap:12px;padding:20px 24px;background:var(--primary-light);border-radius:var(--radius-lg);margin:28px 0;}
    .helpful-bar p{font-size:14px;color:var(--primary-dark);font-weight:500;flex:1;}
    .helpful-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 22px;background:var(--primary);color:white;border:none;border-radius:var(--radius-full);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;}
    .helpful-btn:hover{background:var(--primary-dark);}
    .helpful-btn i{font-size:16px;}
    .section-divider{margin:28px 0;border:none;border-top:1px solid var(--border-light);}
    .comments-section h3{font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:20px;}
    .comment{display:flex;gap:12px;margin-bottom:20px;}
    .comment-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid var(--border);flex-shrink:0;}
    .comment-bubble{flex:1;background:var(--bg);border-radius:0 var(--radius-md) var(--radius-md) var(--radius-md);padding:12px 16px;}
    .comment-author{font-size:13px;font-weight:600;}
    .comment-time{font-size:11px;color:var(--text-muted);margin-left:8px;}
    .comment-text{font-size:13px;line-height:1.6;margin-top:6px;color:var(--text);}
    .comment-actions{display:flex;gap:12px;margin-top:8px;}
    .comment-action{font-size:12px;color:var(--text-muted);cursor:pointer;display:inline-flex;align-items:center;gap:4px;transition:color 0.2s;}
    .comment-action:hover{color:var(--primary);}
    .comment-action i{font-size:13px;}
    .comment-input-area{display:flex;gap:12px;margin-top:20px;align-items:flex-start;}
    .comment-input-box{flex:1;}
    .comment-actions-row{display:flex;justify-content:flex-end;margin-top:8px;}
    /* sidebar */
    .sidebar-widget{background:var(--card);border-radius:var(--radius-lg);border:1px solid var(--border-light);padding:20px;}
    .widget-title{font-family:'DM Serif Display',serif;font-size:16px;margin-bottom:14px;}
    .related-post{display:flex;gap:10px;margin-bottom:14px;cursor:pointer;text-decoration:none;color:var(--text);}
    .related-post:last-child{margin-bottom:0;}
    .related-thumb{width:54px;height:54px;border-radius:var(--radius-sm);object-fit:cover;flex-shrink:0;background:var(--bg-alt);}
    .related-title{font-size:13px;font-weight:600;line-height:1.4;margin-bottom:4px;}
    .related-meta{font-size:11px;color:var(--text-muted);}
    .tag-cloud{display:flex;flex-wrap:wrap;gap:6px;}
    .tag{display:inline-flex;padding:5px 12px;border-radius:var(--radius-full);font-size:12px;font-weight:500;background:var(--bg-alt);color:var(--text-muted);cursor:pointer;transition:all 0.2s;border:1.5px solid var(--border);}
    .tag:hover{border-color:var(--primary);color:var(--primary);}
    /* report link */
    .report-link{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--text-light);cursor:pointer;margin-top:4px;transition:color 0.2s;}
    .report-link:hover{color:var(--accent);}
  </style>
</head>
<body>
  <div class="sc-app">
    <aside class="sc-sidebar">
      <!-- Injected by ui.js -->
    </aside>
    <div class="sc-main">
      <div class="sc-topbar">
        <!-- Injected by ui.js -->
      </div>
      <div class="sc-content">
        <div class="detail-layout">
          <!-- Post content -->
          <div>
            <div class="disclaimer mb-24">
              <i class="ri-information-line"></i>
              <span>Personal experience only — not medical advice. Talk to your doctor before changing your diet.</span>
            </div>

            <img src="" alt="" class="post-hero" id="postHeroImage">

            <span class="badge mb-16" id="postCategoryBadge"><i class="ri-loader-4-line"></i> Loading...</span>

            <h2 style="font-family:'DM Serif Display',serif;font-size:28px;line-height:1.2;margin-bottom:12px;" id="postTitle">Loading post...</h2>

            <div class="author-row">
              <img src="" alt="" class="avatar avatar-md" id="authorAvatar">
              <div class="author-info">
                <div class="author-name" id="authorName">Loading...</div>
                <div class="author-bio" id="authorBio">Loading...</div>
              </div>
              <div class="post-meta-bar" style="margin:0;gap:16px;">
                <div class="post-meta-item" id="postDate"><i class="ri-calendar-line"></i> Loading...</div>
                <div class="post-meta-item" id="readTime"><i class="ri-time-line"></i> Loading...</div>
              </div>
            </div>

            <div class="post-body" id="postBody">
              <!-- Post content will be loaded dynamically -->
            </div>

            <div class="helpful-bar">
              <p>Did this post help you?</p>
              <button class="helpful-btn" id="helpfulBtn"><i class="ri-thumb-up-line"></i> Mark as Helpful (<span id="helpfulCount">0</span>)</button>
            </div>

            <hr class="section-divider">

            <!-- Comments -->
            <div class="comments-section">
              <h3 id="commentCount">0 Comments</h3>

              <div id="commentsList">
                <!-- Comments will be loaded dynamically -->
              </div>

              <!-- Add comment -->
              <div class="comment-input-area">
                <img src="" alt="" class="comment-avatar" id="currentUserAvatar">
                <div class="comment-input-box">
                  <textarea class="form-input" style="min-height:80px;" placeholder="Add a comment…" id="commentInput"></textarea>
                  <div class="comment-actions-row">
                    <button class="btn btn-primary btn-sm" id="postCommentBtn">Post Comment</button>
                  </div>
                </div>
              </div>

              <div style="margin-top:20px;">
                <span class="report-link"><i class="ri-flag-line"></i> Report this post</span>
              </div>
            </div>
          </div>

          <!-- Sidebar -->
          <div style="display:flex;flex-direction:column;gap:16px;">
            <div class="sidebar-widget">
              <div class="widget-title">About the Author</div>
              <div style="text-align:center;padding:8px 0 16px;">
                <img src="" alt="" style="width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid var(--border);margin-bottom:10px;display:block;margin-left:auto;margin-right:auto;" id="authorSidebarAvatar">
                <div style="font-size:15px;font-weight:600;" id="authorSidebarName">Loading...</div>
                <div style="font-size:12px;color:var(--text-muted);margin-top:3px;" id="authorSidebarBio">Loading...</div>
              </div>
              <button class="btn btn-outline w-full btn-sm" style="justify-content:center;" id="followBtn">Follow</button>
            </div>

            <div class="sidebar-widget">
              <div class="widget-title">Related Posts</div>
              <div id="relatedPosts">
                <!-- Related posts will be loaded dynamically -->
              </div>
            </div>

            <div class="sidebar-widget">
              <div class="widget-title">Tags</div>
              <div class="tag-cloud" id="tagCloud">
                <!-- Tags will be loaded dynamically -->
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="../js/env.js"></script>
  <script type="module">
    import { requireAuth, logOut } from '../js/auth.js';
    import { initAppShell } from '../js/ui.js';
    import {
      getPost, markHelpful, addComment, listenToComments,
      savePost, unsavePost, isSaved, reportPost,
      getCategoryLabel, getCategoryIcon, formatHelpfulCount
    } from '../js/community.js';

    window.logOut = logOut;
    document.querySelector('.sc-logout').addEventListener('click', () => logOut());

    function timeAgo(ts) {
      if (!ts) return '';
      const date = ts.toDate ? ts.toDate() : new Date(ts);
      const diff = Math.floor((Date.now() - date.getTime()) / 1000);
      if (diff < 60) return 'Just now';
      if (diff < 3600) return `${Math.floor(diff / 60)} min ago`;
      if (diff < 86400) return `${Math.floor(diff / 3600)} hrs ago`;
      if (diff < 172800) return 'Yesterday';
      return date.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    requireAuth(async (profile) => {
      initAppShell(profile);

      const params = new URLSearchParams(window.location.search);
      const postId = params.get('id');

      if (!postId) {
        document.querySelector('.sc-content').innerHTML = '<div class="empty-state"><i class="ri-error-warning-line"></i><h3>Post not found</h3><p>This post does not exist or has been removed.</p><a href="feed.html" class="btn btn-primary">Back to Feed</a></div>';
        return;
      }

      const post = await getPost(postId);

      if (!post) {
        document.querySelector('.sc-content').innerHTML = '<div class="empty-state"><i class="ri-error-warning-line"></i><h3>Post not found</h3><p>This post does not exist or has been removed.</p><a href="feed.html" class="btn btn-primary">Back to Feed</a></div>';
        return;
      }

      // Render the post content
      const catIcon = getCategoryIcon(post.category);
      const catLabel = getCategoryLabel(post.category);
      const savedAlready = await isSaved(profile.uid, postId);
      const alreadyHelpful = post.helpfulBy?.includes(profile.uid);

      // Update topbar
      document.querySelector('.sc-topbar-sub').textContent = `${catLabel} · Posted by ${post.authorName || 'Anonymous'}`;
      document.title = `ShareCare — ${post.title}`;

      // Build post HTML
      const postContent = document.querySelector('.detail-layout > div:first-child');
      postContent.innerHTML = `
        <div class="disclaimer mb-24">
          <i class="ri-information-line"></i>
          <span>Personal experience only — not medical advice. Talk to your doctor before making any changes.</span>
        </div>
        <span class="badge badge-primary mb-16"><i class="${catIcon}"></i> ${catLabel}</span>
        <h2 style="font-family:'DM Serif Display',serif;font-size:28px;line-height:1.2;margin-bottom:12px;">${post.title}</h2>
        <div class="author-row">
          <div class="avatar avatar-md" style="width:42px;height:42px;border-radius:50%;background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--primary-dark);flex-shrink:0;">${(post.authorName||'?')[0].toUpperCase()}</div>
          <div class="author-info">
            <div class="author-name">${post.authorName || 'Anonymous'}</div>
            <div class="author-bio">ShareCare member</div>
          </div>
          <div class="post-meta-bar" style="margin:0;gap:16px;">
            <div class="post-meta-item"><i class="ri-calendar-line"></i> ${timeAgo(post.createdAt)}</div>
          </div>
        </div>
        <div class="post-body" style="white-space:pre-wrap;">${post.body}</div>
        ${post.tags && post.tags.length > 0 ? `<div class="tag-cloud" style="margin-top:16px;">${post.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>` : ''}
        <div class="helpful-bar">
          <p>Did this post help you?</p>
          <button class="helpful-btn" id="helpfulBtn" ${alreadyHelpful ? 'disabled style="opacity:0.7;"' : ''}>
            <i class="ri-thumb-up-${alreadyHelpful ? 'fill' : 'line'}"></i>
            <span id="helpfulLabel">${alreadyHelpful ? 'Marked Helpful' : 'Mark as Helpful'} (${formatHelpfulCount(post.helpfulCount || 0)})</span>
          </button>
        </div>
        <hr class="section-divider">
        <div class="comments-section">
          <h3 id="commentCount">${post.commentCount || 0} Comment${post.commentCount !== 1 ? 's' : ''}</h3>
          <div id="commentsList"></div>
          <div class="comment-input-area">
            <div class="comment-avatar" style="width:36px;height:36px;border-radius:50%;background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--primary-dark);flex-shrink:0;">${(profile.name||'?')[0].toUpperCase()}</div>
            <div class="comment-input-box">
              <textarea class="form-input" id="commentInput" style="min-height:80px;" placeholder="Add a comment…"></textarea>
              <div class="comment-actions-row">
                <button class="btn btn-primary btn-sm" id="postCommentBtn">Post Comment</button>
              </div>
            </div>
          </div>
          <div style="margin-top:20px;">
            <span class="report-link" id="reportLink"><i class="ri-flag-line"></i> Report this post</span>
          </div>
        </div>`;

      // Helpful button
      document.getElementById('helpfulBtn')?.addEventListener('click', async () => {
        try {
          await markHelpful(postId, profile.uid);
          const btn = document.getElementById('helpfulBtn');
          btn.disabled = true;
          btn.style.opacity = '0.7';
          btn.querySelector('i').className = 'ri-thumb-up-fill';
          document.getElementById('helpfulLabel').textContent = `Marked Helpful (${formatHelpfulCount((post.helpfulCount || 0) + 1)})`;
        } catch (err) { console.error('Helpful error:', err); }
      });

      // Save button
      let isSavedNow = savedAlready;
      const saveBtn = document.querySelector('.sc-topbar-right .btn-outline');
      if (saveBtn) {
        saveBtn.innerHTML = `<i class="${isSavedNow ? 'ri-bookmark-fill' : 'ri-bookmark-line'}"></i> ${isSavedNow ? 'Saved' : 'Save'}`;
        saveBtn.addEventListener('click', async () => {
          try {
            if (isSavedNow) { await unsavePost(profile.uid, postId); isSavedNow = false; saveBtn.innerHTML = '<i class="ri-bookmark-line"></i> Save'; }
            else            { await savePost(profile.uid, postId);   isSavedNow = true;  saveBtn.innerHTML = '<i class="ri-bookmark-fill"></i> Saved'; }
          } catch (err) { console.error('Save error:', err); }
        });
      }

      // Report link
      document.getElementById('reportLink')?.addEventListener('click', async () => {
        const reason = prompt('Why are you reporting this post? (optional)') || 'No reason given';
        try {
          await reportPost(postId, profile.uid, reason);
          alert('Thank you — this post has been reported for review.');
        } catch (err) { console.error('Report error:', err); }
      });

      // Post comment
      document.getElementById('postCommentBtn')?.addEventListener('click', async () => {
        const input = document.getElementById('commentInput');
        const text = input.value.trim();
        if (!text) return;
        const btn = document.getElementById('postCommentBtn');
        btn.disabled = true;
        btn.textContent = 'Posting…';
        try {
          await addComment(postId, profile.uid, profile.name || 'Anonymous', text);
          input.value = '';
        } catch (err) { console.error('Comment error:', err); }
        btn.disabled = false;
        btn.textContent = 'Post Comment';
      });

      // Live comments listener
      listenToComments(postId, (comments) => {
        const list = document.getElementById('commentsList');
        const countEl = document.getElementById('commentCount');
        if (!list) return;
        if (countEl) countEl.textContent = `${comments.length} Comment${comments.length !== 1 ? 's' : ''}`;
        list.innerHTML = comments.map(c => `
          <div class="comment">
            <div class="comment-avatar" style="width:36px;height:36px;border-radius:50%;background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--primary-dark);flex-shrink:0;">${(c.authorName||'?')[0].toUpperCase()}</div>
            <div class="comment-bubble">
              <span class="comment-author">${c.authorName || 'Anonymous'}</span>
              <span class="comment-time">${timeAgo(c.createdAt)}</span>
              <div class="comment-text">${c.text}</div>
            </div>
          </div>`).join('');
      });
    });
  </script>
</body>
</html>
