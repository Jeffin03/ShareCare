<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShareCare — Log In</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,700;1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #5C8D7A; --primary-dark: #4A7363; --primary-light: #EAF2EF;
            --accent: #E8A598; --accent-light: #FCF0EE;
            --bg: #F8F6F2; --card: #FFFFFF; --text: #2C3A35;
            --text-muted: #7A8C86; --border: #E8E4DF;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; }

        nav { width: 100%; height: 72px; background: var(--card); display: flex; align-items: center; justify-content: space-between; padding: 0 60px; border-bottom: 1px solid var(--border); }
        .logo { display: flex; align-items: center; gap: 10px; font-family: 'Lora', serif; font-size: 22px; font-weight: 700; color: var(--primary); text-decoration: none; }
        .logo i { color: var(--accent); font-size: 24px; }

        .auth-page { flex: 1; display: flex; align-items: center; justify-content: center; padding: 48px 24px; }
        .auth-card { background: var(--card); border-radius: 24px; padding: 52px 48px; width: 100%; max-width: 460px; border: 1px solid var(--border); box-shadow: 0 8px 40px rgba(92,141,122,0.08); }

        .auth-header { text-align: center; margin-bottom: 36px; }
        .auth-header h1 { font-family: 'Lora', serif; font-size: 28px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
        .auth-header p { font-size: 15px; color: var(--text-muted); }

        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
        .input-wrap { position: relative; }
        .input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #BFC9C4; font-size: 18px; }
        .input {
            width: 100%; padding: 13px 14px 13px 42px;
            border: 1.5px solid var(--border); border-radius: 10px;
            font-family: 'Inter', sans-serif; font-size: 15px; color: var(--text);
            background: #FAFAF8; outline: none; transition: all 0.2s;
        }
        .input:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 3px rgba(92,141,122,0.1); }
        .input::placeholder { color: #BFC9C4; }

        .forgot { text-align: right; margin-top: 6px; }
        .forgot a { font-size: 13px; color: var(--primary); text-decoration: none; font-weight: 500; }
        .forgot a:hover { text-decoration: underline; }

        .btn-submit { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px; transition: all 0.2s; box-shadow: 0 4px 14px rgba(92,141,122,0.3); }
        .btn-submit:hover { background: var(--primary-dark); transform: translateY(-1px); }

        .divider { position: relative; text-align: center; margin: 24px 0; }
        .divider::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: var(--border); }
        .divider span { background: var(--card); padding: 0 14px; position: relative; font-size: 13px; color: var(--text-muted); }

        .auth-footer { text-align: center; }
        .auth-footer p { font-size: 14px; color: var(--text-muted); margin-bottom: 12px; }
        .auth-footer a { color: var(--primary); font-weight: 600; text-decoration: none; }
        .auth-footer a:hover { text-decoration: underline; }

        .guest-btn { display: inline-flex; align-items: center; gap: 8px; color: var(--text-muted); text-decoration: none; font-size: 14px; font-weight: 500; padding: 10px 20px; border-radius: 50px; background: var(--bg); border: 1px solid var(--border); transition: all 0.2s; }
        .guest-btn:hover { border-color: var(--primary); color: var(--primary); }
    </style>
</head>
<body>
    <nav>
        <a href="ShareCare_-_Landing_Page.html" class="logo"><i class="ri-heart-pulse-fill"></i> ShareCare</a>
    </nav>

    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Welcome back</h1>
                <p>Log in to continue to your community</p>
            </div>

            <form>
                <div class="form-group">
                    <label class="form-label">Email address</label>
                    <div class="input-wrap">
                        <i class="ri-mail-line input-icon"></i>
                        <input type="email" class="input" placeholder="name@example.com">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-wrap">
                        <i class="ri-lock-2-line input-icon"></i>
                        <input type="password" class="input" placeholder="••••••••">
                    </div>
                    <div class="forgot"><a href="#">Forgot password?</a></div>
                </div>
                <button type="button" class="btn-submit">Log in</button>
            </form>

            <div class="divider"><span>or</span></div>

            <div class="auth-footer">
                <p>Don't have an account? <a href="ShareCare_-_Sign-up_Page.html">Create one free</a></p>
                <a href="ShareCare_-_Community_Feed__Guest_.html" class="guest-btn">
                    Continue as guest <i class="ri-arrow-right-line"></i>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
