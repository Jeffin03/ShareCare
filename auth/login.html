<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShareCare — Log In</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/styles.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .auth-page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      background: var(--bg);
    }

    .auth-split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      max-width: 900px;
      width: 100%;
      background: var(--card);
      border-radius: var(--r-xl);
      overflow: hidden;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border-light);
    }

    .auth-panel {
      padding: 52px 48px;
    }

    .auth-visual {
      background: linear-gradient(145deg, var(--primary) 0%, var(--primary-dark) 100%);
      padding: 52px 40px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }

    .auth-visual::before {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 50%;
      top: -80px;
      right: -80px;
    }

    .auth-visual::after {
      content: '';
      position: absolute;
      width: 200px;
      height: 200px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 50%;
      bottom: -40px;
      left: -40px;
    }

    .visual-top .logo-v {
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
      color: white;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 40px;
    }

    .visual-top .logo-v i {
      color: rgba(255, 255, 255, 0.7);
      font-size: 1.6rem;
    }

    .visual-quote {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 1.4rem;
      color: white;
      line-height: 1.4;
      margin-bottom: 12px;
    }

    .visual-sub {
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.65);
    }

    .visual-dots {
      display: flex;
      gap: 6px;
      margin-top: auto;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
    }

    .dot.active {
      background: white;
      width: 24px;
    }

    .auth-header {
      margin-bottom: 32px;
    }

    .auth-header h2 {
      margin-bottom: 6px;
      color: var(--text);
    }

    .auth-header p {
      font-size: 0.88rem;
    }

    .btn-submit {
      width: 100%;
      padding: 13px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--r);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.2s;
      box-shadow: 0 4px 14px rgba(92, 141, 122, 0.3);
    }

    .btn-submit:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    .auth-footer {
      text-align: center;
      margin-top: 20px;
    }

    .auth-footer p {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .auth-footer a {
      color: var(--primary);
      font-weight: 600;
      text-decoration: none;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    .guest-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.84rem;
      font-weight: 500;
      margin-top: 10px;
      padding: 8px 18px;
      border-radius: var(--r-full);
      border: 1px solid var(--border);
      transition: all 0.2s;
    }

    .guest-link:hover {
      border-color: var(--primary);
      color: var(--primary);
    }
  </style>
</head>

<body>
  <nav class="nav">
    <a href="../index.html" class="nav-logo"><i class="ri-heart-pulse-fill"></i> ShareCare</a>
  </nav>

  <div class="auth-page">
    <div class="auth-split">
      <!-- Visual panel -->
      <div class="auth-visual">
        <div class="visual-top">
          <div class="logo-v"><i class="ri-heart-pulse-fill"></i> ShareCare</div>
          <div class="visual-quote">"Managing diabetes is a journey. You don't have to walk it alone."</div>
          <div class="visual-sub">Join thousands finding support every day</div>
        </div>
        <div class="visual-dots">
          <div class="dot active"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>

      <!-- Form panel -->
      <div class="auth-panel">
        <div class="auth-header">
          <h2>Welcome back</h2>
          <p>Log in to continue to ShareCare</p>
        </div>

        <form>
          <div class="form-group">
            <label class="label">Email address</label>
            <div class="input-wrap">
              <i class="ri-mail-line i-left"></i>
              <input type="email" class="input" placeholder="name@example.com">
            </div>
          </div>
          <div class="form-group">
            <label class="label" style="display:flex;justify-content:space-between;">
              Password
              <a href="#" style="color:var(--primary);font-weight:500;font-size:0.78rem;">Forgot password?</a>
            </label>
            <div class="input-wrap">
              <i class="ri-lock-2-line i-left"></i>
              <input type="password" class="input" placeholder="••••••••" id="pw">
              <i class="ri-eye-off-line i-right" onclick="togglePw()"></i>
            </div>
          </div>
          <button type="button" class="btn-submit">Log in</button>
        </form>

        <div class="divider"><span>or</span></div>
        <div class="auth-footer">
          <p>Don't have an account? <a href="signup.html">Create one free</a></p>
          <a href="../community/feed.html" class="guest-link">
            <i class="ri-compass-3-line"></i> Browse as guest
          </a>
        </div>
      </div>
    </div>
  </div>

  <script>
    function togglePw() { const i = document.getElementById('pw'); i.type = i.type === 'password' ? 'text' : 'password'; }
  </script>
</body>

</html>
