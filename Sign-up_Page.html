<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShareCare — Create Account</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,700;1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #5C8D7A; --primary-dark: #4A7363; --primary-light: #EAF2EF;
            --accent: #E8A598; --accent-light: #FCF0EE;
            --bg: #F8F6F2; --card: #FFFFFF; --text: #2C3A35;
            --text-muted: #7A8C86; --border: #E8E4DF;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; }

        nav { width: 100%; height: 72px; background: var(--card); display: flex; align-items: center; justify-content: space-between; padding: 0 60px; border-bottom: 1px solid var(--border); }
        .logo { display: flex; align-items: center; gap: 10px; font-family: 'Lora', serif; font-size: 22px; font-weight: 700; color: var(--primary); text-decoration: none; }
        .logo i { color: var(--accent); font-size: 24px; }

        .auth-page { flex: 1; display: flex; align-items: center; justify-content: center; padding: 48px 24px; }
        .auth-card { background: var(--card); border-radius: 24px; padding: 52px 48px; width: 100%; max-width: 480px; border: 1px solid var(--border); box-shadow: 0 8px 40px rgba(92,141,122,0.08); }

        .auth-header { text-align: center; margin-bottom: 32px; }
        .auth-header h1 { font-family: 'Lora', serif; font-size: 28px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
        .auth-header p { font-size: 15px; color: var(--text-muted); }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .form-group { margin-bottom: 18px; }
        .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 7px; }
        .input-wrap { position: relative; }
        .input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #BFC9C4; font-size: 18px; }
        .toggle-pw { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: #BFC9C4; font-size: 18px; cursor: pointer; }
        .input {
            width: 100%; padding: 13px 14px 13px 42px;
            border: 1.5px solid var(--border); border-radius: 10px;
            font-family: 'Inter', sans-serif; font-size: 15px; color: var(--text);
            background: #FAFAF8; outline: none; transition: all 0.2s;
        }
        .input:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 3px rgba(92,141,122,0.1); }
        .input::placeholder { color: #BFC9C4; }
        .hint { font-size: 12px; color: var(--text-muted); margin-top: 5px; }

        /* Role selector */
        .role-group { margin-bottom: 18px; }
        .role-label { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 10px; display: block; }
        .role-options { display: flex; gap: 10px; }
        .role-option { flex: 1; padding: 10px 8px; border: 1.5px solid var(--border); border-radius: 10px; text-align: center; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text-muted); transition: all 0.2s; }
        .role-option:hover { border-color: var(--primary); color: var(--primary); }
        .role-option.selected { border-color: var(--primary); background: var(--primary-light); color: var(--primary-dark); }
        .role-option i { display: block; font-size: 20px; margin-bottom: 4px; }

        .btn-submit { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px; transition: all 0.2s; box-shadow: 0 4px 14px rgba(92,141,122,0.3); }
        .btn-submit:hover { background: var(--primary-dark); transform: translateY(-1px); }

        .terms { font-size: 12px; color: var(--text-muted); text-align: center; margin-top: 12px; line-height: 1.5; }
        .terms a { color: var(--primary); text-decoration: none; }

        .divider { position: relative; text-align: center; margin: 22px 0; }
        .divider::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: var(--border); }
        .divider span { background: var(--card); padding: 0 14px; position: relative; font-size: 13px; color: var(--text-muted); }

        .auth-footer { text-align: center; }
        .auth-footer p { font-size: 14px; color: var(--text-muted); margin-bottom: 10px; }
        .auth-footer a { color: var(--primary); font-weight: 600; text-decoration: none; }
        .auth-footer a:hover { text-decoration: underline; }
        .guest-btn { display: inline-flex; align-items: center; gap: 8px; color: var(--text-muted); text-decoration: none; font-size: 14px; font-weight: 500; padding: 10px 20px; border-radius: 50px; background: var(--bg); border: 1px solid var(--border); transition: all 0.2s; }
        .guest-btn:hover { border-color: var(--primary); color: var(--primary); }
    </style>
</head>
<body>
    <nav>
        <a href="ShareCare_-_Landing_Page.html" class="logo"><i class="ri-heart-pulse-fill"></i> ShareCare</a>
    </nav>

    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Join ShareCare</h1>
                <p>Connect with a community that understands</p>
            </div>

            <form>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">First name</label>
                        <div class="input-wrap">
                            <i class="ri-user-line input-icon"></i>
                            <input type="text" class="input" placeholder="Alex">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Last name</label>
                        <div class="input-wrap">
                            <i class="ri-user-line input-icon"></i>
                            <input type="text" class="input" placeholder="Johnson">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Email address</label>
                    <div class="input-wrap">
                        <i class="ri-mail-line input-icon"></i>
                        <input type="email" class="input" placeholder="name@example.com">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-wrap">
                        <i class="ri-lock-2-line input-icon"></i>
                        <input type="password" class="input" placeholder="••••••••">
                        <i class="ri-eye-off-line toggle-pw"></i>
                    </div>
                    <div class="hint">At least 8 characters</div>
                </div>

                <div class="role-group">
                    <span class="role-label">I am a</span>
                    <div class="role-options">
                        <div class="role-option selected" onclick="selectRole(this)">
                            <i class="ri-user-heart-line"></i> Patient
                        </div>
                        <div class="role-option" onclick="selectRole(this)">
                            <i class="ri-parent-line"></i> Caregiver
                        </div>
                        <div class="role-option" onclick="selectRole(this)">
                            <i class="ri-user-star-line"></i> Both
                        </div>
                    </div>
                </div>

                <button type="button" class="btn-submit">Create account</button>
                <p class="terms">By signing up, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</p>
            </form>

            <div class="divider"><span>or</span></div>
            <div class="auth-footer">
                <p>Already have an account? <a href="ShareCare_-_Login_Page.html">Log in</a></p>
                <a href="ShareCare_-_Community_Feed__Guest_.html" class="guest-btn">
                    <i class="ri-compass-3-line"></i> Explore as guest
                </a>
            </div>
        </div>
    </div>

    <script>
        function selectRole(el) {
            document.querySelectorAll('.role-option').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
        }
    </script>
</body>
</html>
